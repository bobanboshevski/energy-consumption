schema: '2.0'
stages:
  fetch_energy_demand:
    cmd: "uv run python -m src.data.fetch.fetch_energy_demand_data\ngit commit -am
      \"Updated energy demand data on `date` with DVC pipeline and GitHub workflows\"\
      \ || true\ngit push || true\nuv run dvc push || true\n"
    deps:
    - path: src/data/fetch/fetch_energy_demand_data.py
      hash: md5
      md5: c54e7fde779525d5ca3c771e853d7144
      size: 3118
    params:
      params.yaml:
        fetch.energy_demand.file_path: data/raw/energy_demand/energy_demand.json
        fetch.energy_demand.url: https://api.iea.org/rte/demand/SVN/timeseries
    outs:
    - path: data/raw/energy_demand/energy_demand.json
      hash: md5
      md5: 4481a5e325761ea88d8d16670bb5ef25
      size: 259914
  fetch_weather_history:
    cmd: "uv run python -m src.data.fetch.fetch_weather_past_data\ngit commit -am
      \"Updated weather history data on `date` with DVC pipeline and GitHub workflows\"\
      \ || true\ngit push || true\nuv run dvc push || true\n"
    deps:
    - path: src/data/fetch/fetch_weather_past_data.py
      hash: md5
      md5: f11472cc030965e0a383d11bfb96f9f0
      size: 1960
    params:
      params.yaml:
        fetch.weather_history.lat: 46.05
        fetch.weather_history.lon: 14.5
        fetch.weather_history.url: https://archive-api.open-meteo.com/v1/archive
    outs:
    - path: data/raw/weather/history/weather_history.json
      hash: md5
      md5: 10598da163c2265f495790c384b8f5e5
      size: 192666
  fetch_weather_forecast:
    cmd: "uv run python -m src.data.fetch.fetch_weather_forecast_data\ngit commit
      -am \"Updated weather forecast data on `date` with DVC pipeline and GitHub workflows\"\
      \ || true\ngit push || true\nuv run dvc push || true\n"
    deps:
    - path: src/data/fetch/fetch_weather_forecast_data.py
      hash: md5
      md5: ca9f304a3c4b4940ef35056fc56045c3
      size: 960
    params:
      params.yaml:
        fetch.weather_forecast.forecast_days: 16
        fetch.weather_forecast.lat: 46.05
        fetch.weather_forecast.lon: 14.5
        fetch.weather_forecast.url: https://api.open-meteo.com/v1/forecast
    outs:
    - path: data/raw/weather/forecast/weather_forecast.json
      hash: md5
      md5: ce1d1f45f0285d894830ee127d6b08f8
      size: 1900
  preprocess:
    cmd: "uv run python -m src.data.preprocess.merge_datasets\ngit commit -am \"Updated
      preprocessed data on `date` with DVC pipeline and GitHub workflow\" || true\n
      git push || true\nuv run dvc push || true\n"
    deps:
    - path: data/raw/energy_demand/energy_demand.json
      hash: md5
      md5: 0359cf98f942c0d4ee3103b8a2eef962
      size: 259798
    - path: data/raw/weather/forecast/weather_forecast.json
      hash: md5
      md5: ac971f4b10f878a71c1cbe55afd3478d
      size: 1900
    - path: data/raw/weather/history/weather_history.json
      hash: md5
      md5: 7bfdcd9784cd63465a525f3e6744cbea
      size: 192583
    - path: src/data/preprocess/merge_datasets.py
      hash: md5
      md5: 2d3316a84102c7536bd921739d55f09a
      size: 3131
    params:
      params.yaml:
        preprocess.output_path: data/preprocessed/final_dataset.csv
    outs:
    - path: data/preprocessed/final_dataset.csv
      hash: md5
      md5: 7934d5d5ac95fd49fc5051a7dc06c326
      size: 117985
  validate:
    cmd: "cd gx && uv run python run_checkpoint.py\n"
    deps:
    - path: data/preprocessed/final_dataset.csv
      hash: md5
      md5: 7934d5d5ac95fd49fc5051a7dc06c326
      size: 117985
  test_data:
    cmd: "uv run python src/data/test/test_data.py\n"
    deps:
    - path: data/preprocessed/final_dataset.csv
      hash: md5
      md5: 7934d5d5ac95fd49fc5051a7dc06c326
      size: 117985
    - path: src/data/test/test_data.py
      hash: md5
      md5: 5975c2fc783491020b747f023e156009
      size: 3281
    outs:
    - path: data/reference
      hash: md5
      md5: 0c49edcf509e1be918a00c1a1dd6bb43.dir
      size: 117727
      nfiles: 1
  train:
    cmd: "uv run python src/models/train.py\ngit commit -am \"Updated model on `date`
      with DVC pipeline\" || true\ngit push || true\nuv run dvc push || true\n"
    deps:
    - path: data/preprocessed/final_dataset.csv
      hash: md5
      md5: 7934d5d5ac95fd49fc5051a7dc06c326
      size: 117985
    - path: data/reference
      hash: md5
      md5: 0c49edcf509e1be918a00c1a1dd6bb43.dir
      size: 117727
      nfiles: 1
    - path: gx/uncommitted
      hash: md5
      md5: ac586d32147c804ec8acc65f408dcd53.dir
      size: 4217576
      nfiles: 26
    - path: src/models/preprocess.py
      hash: md5
      md5: 85d85eccc9061ffc55a72c9ae941415f
      size: 1343
    - path: src/models/train.py
      hash: md5
      md5: 286169334be3f400088628f511e4b48c
      size: 7677
    params:
      params.yaml:
        train.feature_cols:
        - temp_max
        - temp_min
        - daylight_duration
        train.random_state: 42
        train.target_col: energy_demand
        train.test_size: 90
        train.window_size: 30
    outs:
    - path: models/
      hash: md5
      md5: 0ee4b3fc08ff4e19688272b85e45fc25.dir
      size: 415131
      nfiles: 2
