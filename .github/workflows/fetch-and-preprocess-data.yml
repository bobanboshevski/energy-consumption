name: Fetch and preprocess data on schedule

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' # every day at midnight

jobs:
  fetch_and_preprocess:
    name: Fetch and preprocess all data
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Install uv
        run: |
          pipx install uv

      # ✅ INSTALL DVC
      - name: Setup DVC
        uses: iterative/setup-dvc@c1

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          uv sync --frozen

      # ✅ AUTHENTICATE TO AWS S3
      - name: Configure AWS credentials for DVC
        run: |
          dvc remote modify origin --local access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
          dvc remote modify origin --local secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      # ✅ PULL EXISTING VERSIONED DATA
      - name: DVC pull data
        run: |
          dvc pull

      - name: Fetch energy demand
        run: |
          uv run python -m src.data.fetch.fetch_energy_demand_data

      - name: Fetch weather history
        run: |
          uv run python -m src.data.fetch.fetch_weather_past_data

      - name: Fetch weather forecast
        run: |
          uv run python -m src.data.fetch.fetch_weather_forecast_data

      - name: Preprocess and merge data
        run: |
          uv run python -m src.data.preprocess.merge_datasets

      # ✅ VERSION DATA WITH DVC
      - name: Track and push data with DVC
        run: |
          dvc add data
          dvc push

      # ✅ COMMIT METADATA TO GIT
      - name: Commit DVC metadata
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add data.dvc
          git commit -m "Updated energy & weather data on $(date +'%Y-%m-%d')" || echo "No changes to commit"

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.PAT_TOKEN }}