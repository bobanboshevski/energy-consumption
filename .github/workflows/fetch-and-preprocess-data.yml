name: Fetch and preprocess data on schedule

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' # every day at midnight

jobs:
  fetch_and_preprocess:
    name: Fetch and preprocess all data
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Install uv
        run: |
          pipx install uv

      #      - name: Setup DVC
      ##        uses: iterative/setup-dvc@c1

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          uv sync --frozen

      - name: Fetch energy demand
        run: |
          uv run python src/data/fetch/fetch_energy_demand_data.py

      - name: Fetch weather history
        run: |
          uv run python src/data/fetch/fetch_weather_past_data.py

      - name: Fetch weather forecast
        run: |
          uv run python src/data/fetch/fetch_weather_forecast_data.py

      - name: Preprocess and merge data
        run: |
          uv run python src/data/preprocess/merge_datasets.py

      - name: Commit data changes
        run: |
          git add data
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git commit -m "Updated energy & weather data on $(date +'%Y-%m-%d') via GitHub Actions" || echo "No changes to commit"

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.PAT_TOKEN }}