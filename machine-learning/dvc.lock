schema: '2.0'
stages:
  fetch_energy_demand:
    cmd: "uv run python -m src.data.fetch.fetch_energy_demand_data\ngit commit -am
      \"Updated energy demand data on `date` with DVC pipeline and GitHub workflows\"\
      \ || true\ngit push || true\nuv run dvc push || true\n"
    deps:
    - path: src/data/fetch/fetch_energy_demand_data.py
      hash: md5
      md5: c54e7fde779525d5ca3c771e853d7144
      size: 3118
    params:
      params.yaml:
        fetch.energy_demand.file_path: data/raw/energy_demand/energy_demand.json
        fetch.energy_demand.url: https://api.iea.org/rte/demand/SVN/timeseries
    outs:
    - path: data/raw/energy_demand/energy_demand.json
      hash: md5
      md5: 9647c64ddf4a92af8de7a4b2bbd8cce5
      size: 260030
  fetch_weather_history:
    cmd: "uv run python -m src.data.fetch.fetch_weather_past_data\ngit commit -am
      \"Updated weather history data on `date` with DVC pipeline and GitHub workflows\"\
      \ || true\ngit push || true\nuv run dvc push || true\n"
