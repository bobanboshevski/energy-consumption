    - path: src/data/fetch/fetch_weather_past_data.py
      hash: md5
      md5: f11472cc030965e0a383d11bfb96f9f0
      size: 1960
    params:
      params.yaml:
        fetch.weather_history.lat: 46.05
        fetch.weather_history.lon: 14.5
        fetch.weather_history.url: https://archive-api.open-meteo.com/v1/archive
    outs:
    - path: data/raw/weather/history/weather_history.json
      hash: md5
      md5: 10598da163c2265f495790c384b8f5e5
      size: 192666
  fetch_weather_forecast:
    cmd: "uv run python -m src.data.fetch.fetch_weather_forecast_data\ngit commit
      -am \"Updated weather forecast data on `date` with DVC pipeline and GitHub workflows\"\
      \ || true\ngit push || true\nuv run dvc push || true\n"
    deps:
    - path: src/data/fetch/fetch_weather_forecast_data.py
      hash: md5
      md5: ca9f304a3c4b4940ef35056fc56045c3
      size: 960
    params:
      params.yaml:
        fetch.weather_forecast.forecast_days: 16
        fetch.weather_forecast.lat: 46.05
        fetch.weather_forecast.lon: 14.5
        fetch.weather_forecast.url: https://api.open-meteo.com/v1/forecast
    outs:
    - path: data/raw/weather/forecast/weather_forecast.json
      hash: md5
      md5: 089b6bb889e161e154b75eee4f9b34f3
      size: 1899
  preprocess:
    cmd: "uv run python -m src.data.preprocess.merge_datasets\ngit commit -am \"Updated
      preprocessed data on `date` with DVC pipeline and GitHub workflow\" || true\n
      git push || true\nuv run dvc push || true\n"
